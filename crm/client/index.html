<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LeadFlow CRM</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0b0f1a;--bg2:#111827;--bg3:#1a2235;--bg4:#1f2d42;--card:#141e2e;--card2:#1a2640;--border:#1e3050;--border2:#243660;--text:#e8f0fe;--text2:#8ba4d4;--text3:#5570a0;--accent:#3b82f6;--accent2:#60a5fa;--accent-glow:rgba(59,130,246,0.15);--green:#10b981;--green-bg:rgba(16,185,129,0.12);--amber:#f59e0b;--amber-bg:rgba(245,158,11,0.12);--red:#ef4444;--red-bg:rgba(239,68,68,0.12);--purple:#8b5cf6;--purple-bg:rgba(139,92,246,0.12);--cyan:#06b6d4;--cyan-bg:rgba(6,182,212,0.12);--radius:12px;--radius-sm:8px;--shadow:0 4px 24px rgba(0,0,0,0.4);--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;}
*{margin:0;padding:0;box-sizing:border-box;}
html{font-size:14px;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:9px;}
input,textarea,select{font-family:var(--font);font-size:14px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:var(--radius-sm);padding:10px 14px;width:100%;outline:none;transition:border-color .2s,box-shadow .2s;}
input:focus,textarea:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);}
input::placeholder,textarea::placeholder{color:var(--text3);}
select option{background:var(--bg3);color:var(--text);}
button{font-family:var(--font);cursor:pointer;border:none;outline:none;transition:all .2s;}
.btn{padding:9px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:#2563eb;transform:translateY(-1px);}
.btn-secondary{background:var(--bg4);color:var(--text2);border:1px solid var(--border2);}
.btn-secondary:hover{background:var(--bg3);color:var(--text);}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(239,68,68,0.2);}
.btn-danger:hover{background:rgba(239,68,68,0.2);}
.btn-ghost{background:transparent;color:var(--text3);padding:6px 10px;}
.btn-ghost:hover{color:var(--text2);background:var(--bg3);}
.btn-sm{padding:6px 12px;font-size:12px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;}
.badge-new{background:var(--accent-glow);color:var(--accent2);}
.badge-contacted{background:var(--amber-bg);color:var(--amber);}
.badge-qualified{background:var(--cyan-bg);color:var(--cyan);}
.badge-proposal{background:var(--purple-bg);color:var(--purple);}
.badge-negotiation{background:rgba(251,113,133,0.12);color:#fb7185;}
.badge-converted{background:var(--green-bg);color:var(--green);}
.badge-lost{background:var(--red-bg);color:var(--red);}
.badge-admin{background:var(--accent-glow);color:var(--accent2);}
.badge-manager{background:var(--purple-bg);color:var(--purple);}
.badge-sales{background:var(--green-bg);color:var(--green);}
.badge-high{background:var(--red-bg);color:var(--red);}
.badge-medium{background:var(--amber-bg);color:var(--amber);}
.badge-low{background:var(--green-bg);color:var(--green);}
.toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
.toast{padding:12px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;box-shadow:var(--shadow);animation:slideIn .3s ease;display:flex;align-items:center;gap:8px;max-width:340px;}
.toast-success{background:#064e3b;border:1px solid #065f46;color:#6ee7b7;}
.toast-error{background:#450a0a;border:1px solid #7f1d1d;color:#fca5a5;}
.toast-info{background:#1e3a5f;border:1px solid #1e40af;color:#93c5fd;}
@keyframes slideIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.animate-in{animation:fadeIn .3s ease;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 25px 60px rgba(0,0,0,.7);animation:fadeIn .25s ease;}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:22px 24px 16px;border-bottom:1px solid var(--border);}
.modal-body{padding:24px;}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;}
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.table-wrapper{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{padding:11px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);}
td{padding:13px 14px;border-bottom:1px solid rgba(30,48,80,.5);font-size:13px;vertical-align:middle;}
tr:hover td{background:rgba(255,255,255,.02);}
tr:last-child td{border-bottom:none;}
.sidebar{width:220px;min-height:100vh;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:100;}
.main-content{margin-left:220px;min-height:100vh;display:flex;flex-direction:column;}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.page-content{padding:24px;flex:1;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;transition:all .15s;margin:2px 10px;text-decoration:none;}
.nav-item:hover{background:var(--bg3);color:var(--text2);}
.nav-item.active{background:var(--accent-glow);color:var(--accent2);}
.nav-item svg{opacity:.7;flex-shrink:0;}
.nav-item.active svg{opacity:1;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;position:relative;overflow:hidden;}
.stat-card::before{content:'';position:absolute;top:0;right:0;width:80px;height:80px;border-radius:50%;filter:blur(30px);opacity:.3;}
.stat-card.blue::before{background:var(--accent);}
.stat-card.green::before{background:var(--green);}
.stat-card.amber::before{background:var(--amber);}
.stat-card.purple::before{background:var(--purple);}
.mini-bar{height:4px;border-radius:2px;background:var(--border);overflow:hidden;margin-top:8px;}
.mini-bar-fill{height:100%;border-radius:2px;transition:width .6s ease;}
.pipeline-stage{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:8px;}
.score-ring{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;border:2px solid;font-size:12px;font-weight:700;}
.search-bar{position:relative;}
.search-bar input{padding-left:38px;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--accent-glow);border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--accent2);flex-shrink:0;}
.note-item{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px;position:relative;}
.note-item::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:3px;background:var(--accent);border-radius:0 2px 2px 0;}
.activity-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid rgba(30,48,80,.4);}
.activity-item:last-child{border-bottom:none;}
.activity-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:5px;}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;border-radius:3px;transition:width .6s ease;}
.empty-state{text-align:center;padding:60px 20px;color:var(--text3);}
.empty-state svg{opacity:.3;margin-bottom:12px;}
.login-container{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative;overflow:hidden;}
.login-container::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(59,130,246,.08),transparent 70%);top:-200px;left:-200px;}
.login-container::after{content:'';position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(139,92,246,.06),transparent 70%);bottom:-100px;right:-100px;}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:420px;position:relative;z-index:1;box-shadow:0 30px 80px rgba(0,0,0,.5);}
.logo{display:flex;align-items:center;gap:10px;padding:20px 16px 8px;}
.logo-mark{width:32px;height:32px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);border-radius:8px;display:flex;align-items:center;justify-content:center;}
.divider{height:1px;background:var(--border);margin:8px 0;}
.section-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:4px;}
.section-sub{font-size:13px;color:var(--text3);}
.dropdown{position:relative;display:inline-block;}
.dropdown-menu{position:absolute;top:calc(100% + 6px);right:0;background:var(--card2);border:1px solid var(--border2);border-radius:var(--radius-sm);min-width:160px;box-shadow:var(--shadow);z-index:200;overflow:hidden;}
.dropdown-item{padding:10px 14px;font-size:13px;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:8px;}
.dropdown-item:hover{background:var(--bg4);color:var(--text);}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;background:var(--bg4);color:var(--text3);border:1px solid var(--border);margin:2px;}
.chart-bar{display:flex;align-items:flex-end;gap:8px;height:120px;padding-bottom:20px;position:relative;}
.chart-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.chart-col-bar{width:100%;border-radius:4px 4px 0 0;background:linear-gradient(180deg,var(--accent),rgba(59,130,246,.4));min-height:4px;transition:height .6s ease;}
.chart-col-label{font-size:10px;color:var(--text3);}
.no-select{user-select:none;}
@media(max-width:768px){.sidebar{transform:translateX(-100%);}.main-content{margin-left:0;}.form-row{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useContext,createContext,useRef,useCallback}=React;

// ─── API CONFIG ─────────────────────────────────────────────────────────────
const API_BASE = import.meta.env.VITE_API_URL+"/api";
const api = axios.create({baseURL: API_BASE});
api.interceptors.request.use(cfg=>{
  const token=localStorage.getItem('token');
  if(token) cfg.headers.Authorization=`Bearer ${token}`;
  return cfg;
});
api.interceptors.response.use(r=>r,err=>{
  if(err.response?.status===401){
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.reload();
  }
  return Promise.reject(err);
});

// ─── CONTEXT ────────────────────────────────────────────────────────────────
const AppContext=createContext();
function useApp(){return useContext(AppContext);}

// ─── TOAST ──────────────────────────────────────────────────────────────────
function ToastContainer({toasts}){
  return <div className="toast-container">{toasts.map(t=>(
    <div key={t.id} className={`toast toast-${t.type}`}>
      {t.type==='success'&&<span>✓</span>}
      {t.type==='error'&&<span>✕</span>}
      {t.type==='info'&&<span>ℹ</span>}
      {t.message}
    </div>
  ))}</div>;
}

// ─── ICONS (SVG) ────────────────────────────────────────────────────────────
const Icon=({n,s=16,c})=>{
  const icons={
    dashboard:<><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></>,
    leads:<><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>,
    users:<><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></>,
    chart:<><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></>,
    plus:<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
    edit:<><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>,
    trash:<><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></>,
    search:<><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>,
    logout:<><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></>,
    note:<><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></>,
    export:<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>,
    close:<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
    chevron:<polyline points="6 9 12 15 18 9"/>,
    filter:<><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></>,
    bell:<><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></>,
    eye:<><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></>,
    refresh:<><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></>,
  };
  return <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{color:c,flexShrink:0}}>{icons[n]}</svg>;
};

// ─── HELPERS ────────────────────────────────────────────────────────────────
const fmt=d=>new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
const fmtTime=d=>new Date(d).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
const initials=n=>n?.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)||'?';
const statusColors={new:'blue',contacted:'amber',qualified:'cyan',proposal:'purple',negotiation:'pink',converted:'green',lost:'red'};

// ─── LANDING PAGE ─────────────────────────────────────────────────────────────
function LandingPage({onLogin}){
  const [scrolled,setScrolled]=useState(false);
  useEffect(()=>{
    const handleScroll=()=>setScrolled(window.scrollY>10);
    window.addEventListener('scroll',handleScroll);
    return()=>window.removeEventListener('scroll',handleScroll);
  },[]);

  return(
    <div style={{minHeight:'100vh',background:'linear-gradient(135deg,var(--bg) 0%,#0f172a 50%,#1e293b 100%)',position:'relative',overflow:'hidden'}}>
      {/* Header */}
      <header style={{position:'fixed',top:0,left:0,right:0,zIndex:100,padding:'20px 40px',background:scrolled?'rgba(11,15,26,0.95)':'transparent',backdropFilter:scrolled?'blur(10px)':'none',transition:'all 0.3s ease',borderBottom:scrolled?'1px solid var(--border)':'none'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',maxWidth:'1200px',margin:'0 auto'}}>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div style={{width:40,height:40,background:'linear-gradient(135deg,var(--accent),var(--purple))',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center'}}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
            </div>
            <div>
              <div style={{fontSize:20,fontWeight:700,color:'var(--text)'}}>LeadFlow</div>
              <div style={{fontSize:11,color:'var(--text3)'}}>CRM System</div>
            </div>
          </div>
          <button className="btn btn-primary" onClick={onLogin} style={{padding:'10px 24px',fontSize:14,fontWeight:600}}>
            Sign In
          </button>
        </div>
      </header>

      {/* Hero Section */}
      <section style={{padding:'120px 40px 80px',textAlign:'center',maxWidth:'1200px',margin:'0 auto'}}>
        <div style={{marginBottom:24}}>
          <span className="badge badge-new" style={{fontSize:12,padding:'6px 16px',borderRadius:20}}>AI-Powered Lead Management</span>
        </div>
        <h1 style={{fontSize:'clamp(36px, 8vw, 64px)',fontWeight:800,color:'var(--text)',lineHeight:1.1,marginBottom:24,background:'linear-gradient(135deg,var(--text) 0%,var(--accent2) 100%)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',backgroundClip:'text'}}>
          Transform Your Sales Pipeline with Intelligent CRM
        </h1>
        <p style={{fontSize:'clamp(16px, 2.5vw, 20px)',color:'var(--text3)',lineHeight:1.6,maxWidth:'600px',margin:'0 auto 40px',fontWeight:400}}>
          Streamline lead management, accelerate conversions, and drive revenue growth with our comprehensive CRM solution designed for modern sales teams.
        </p>
        <div style={{display:'flex',gap:16,justifyContent:'center',flexWrap:'wrap'}}>
          <button className="btn btn-primary" onClick={onLogin} style={{padding:'14px 32px',fontSize:16,fontWeight:600,background:'linear-gradient(135deg,var(--accent),var(--purple))',border:'none'}}>
            Get Started Now
          </button>
        </div>
      </section>

      {/* Features Grid */}
      <section style={{padding:'80px 40px',maxWidth:'1200px',margin:'0 auto'}}>
        <div style={{textAlign:'center',marginBottom:60}}>
          <h2 style={{fontSize:'clamp(28px, 4vw, 40px)',fontWeight:700,color:'var(--text)',marginBottom:16}}>Everything You Need to Succeed</h2>
          <p style={{fontSize:18,color:'var(--text3)',maxWidth:'600px',margin:'0 auto'}}>Powerful features that help you close more deals faster</p>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(300px,1fr))',gap:32}}>
          {[
            {icon:'users',title:'Lead Management',desc:'Capture, track, and nurture leads through your entire sales pipeline with intelligent automation.'},
            {icon:'chart',title:'Advanced Analytics',desc:'Get real-time insights into your sales performance with comprehensive dashboards and reports.'},
            {icon:'dashboard',title:'Team Collaboration',desc:'Empower your sales team with tools for seamless communication and task management.'},
            {icon:'note',title:'Smart Notes & Activity',desc:'Keep track of every interaction with detailed notes and automatic activity logging.'},
            {icon:'search',title:'Powerful Search',desc:'Find any lead or information instantly with our advanced search and filtering capabilities.'},
            {icon:'bell',title:'Real-time Notifications',desc:'Stay updated with instant alerts for important lead activities and team updates.'}
          ].map((feature,i)=>(
            <div key={i} className="card" style={{padding:32,textAlign:'center',border:'1px solid var(--border)',background:'var(--card2)',transition:'transform 0.3s ease, box-shadow 0.3s ease'}} onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-4px)';e.currentTarget.style.boxShadow='0 12px 40px rgba(59,130,246,0.15)';}} onMouseLeave={e=>{e.currentTarget.style.transform='translateY(0)';e.currentTarget.style.boxShadow='var(--shadow)';}}>
              <div style={{width:60,height:60,background:'linear-gradient(135deg,var(--accent-glow),var(--purple-bg))',borderRadius:16,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 20px'}}>

// ─── LOGIN PAGE ──────────────────────────────────────────────────────────────
function LoginPage({onLogin, onBackToIntro}){
  const [form,setForm]=useState({email:'',password:''});
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState('');
  const [mode,setMode]=useState('login');
  const [regForm,setRegForm]=useState({name:'',email:'',password:'',role:'sales'});

  const handleLogin=async e=>{
    e.preventDefault();setError('');setLoading(true);
    try{
      const {data}=await api.post('/auth/login',form);
      localStorage.setItem('token',data.token);
      localStorage.setItem('user',JSON.stringify(data.user));
      onLogin(data.user);
    }catch(err){setError(err.response?.data?.error||'Login failed');}
    finally{setLoading(false);}
  };

  const handleRegister=async e=>{
    e.preventDefault();setError('');setLoading(true);
    try{
      const {data}=await api.post('/auth/register',regForm);
      localStorage.setItem('token',data.token);
      localStorage.setItem('user',JSON.stringify(data.user));
      onLogin(data.user);
    }catch(err){setError(err.response?.data?.error||'Registration failed');}
    finally{setLoading(false);}
  };

  return(
    <div className="login-container">
      <div className="login-box animate-in">
        {onBackToIntro && (
          <button 
            onClick={onBackToIntro}
            className="btn btn-ghost" 
            style={{position:'absolute',top:20,right:20,padding:'8px',display:'flex',alignItems:'center',gap:6}}
          >
            <span style={{fontSize:13,color:'var(--text3)'}}>Back</span>
            <Icon n="chevron" s={16} style={{transform:'rotate(90deg)'}}/>
          </button>
        )}
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:28}}>
          <div className="logo-mark"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></div>
          <div>
            <div style={{fontSize:18,fontWeight:700,color:'var(--text)'}}>LeadFlow CRM</div>
            <div style={{fontSize:11,color:'var(--text3)'}}>Client Lead Management</div>
          </div>
        </div>

        <div style={{display:'flex',gap:4,background:'var(--bg3)',borderRadius:'var(--radius-sm)',padding:4,marginBottom:24}}>
          {['login','register'].map(m=>(
            <button key={m} onClick={()=>{setMode(m);setError('');}}
              style={{flex:1,padding:'8px',borderRadius:6,fontSize:13,fontWeight:500,
                background:mode===m?'var(--card)':'transparent',
                color:mode===m?'var(--text)':'var(--text3)',
                border:mode===m?'1px solid var(--border)':'1px solid transparent',
                cursor:'pointer',transition:'all .2s'}}>
              {m==='login'?'Sign In':'Create Account'}
            </button>
          ))}
        </div>

        {error&&<div style={{background:'var(--red-bg)',border:'1px solid rgba(239,68,68,.2)',borderRadius:'var(--radius-sm)',padding:'10px 14px',marginBottom:16,fontSize:13,color:'var(--red)'}}>{error}</div>}

        {mode==='login'?(
          <form onSubmit={handleLogin}>
            <div className="form-group">
              <label className="form-label">Email</label>
              <input type="email" placeholder="admin@company.com" value={form.email}
                onChange={e=>setForm({...form,email:e.target.value})} required/>
            </div>
            <div className="form-group">
              <label className="form-label">Password</label>
              <input type="password" placeholder="••••••••" value={form.password}
                onChange={e=>setForm({...form,password:e.target.value})} required/>
            </div>
            <button type="submit" className="btn btn-primary" style={{width:'100%',justifyContent:'center',padding:'12px',fontSize:14,marginTop:4}} disabled={loading}>
              {loading?'Signing in…':'Sign In'}
            </button>
          </form>
        ):(
          <form onSubmit={handleRegister}>
            <div className="form-group"><label className="form-label">Full Name</label><input placeholder="John Smith" value={regForm.name} onChange={e=>setRegForm({...regForm,name:e.target.value})} required/></div>
            <div className="form-group"><label className="form-label">Email</label><input type="email" placeholder="john@company.com" value={regForm.email} onChange={e=>setRegForm({...regForm,email:e.target.value})} required/></div>
            <div className="form-group"><label className="form-label">Password</label><input type="password" placeholder="Min. 6 characters" value={regForm.password} onChange={e=>setRegForm({...regForm,password:e.target.value})} required/></div>
            <div className="form-group">
              <label className="form-label">Role</label>
              <select value={regForm.role} onChange={e=>setRegForm({...regForm,role:e.target.value})}>
                <option value="sales">Sales Rep</option>
                <option value="manager">Manager</option>
              </select>
            </div>
            <button type="submit" className="btn btn-primary" style={{width:'100%',justifyContent:'center',padding:'12px',fontSize:14}} disabled={loading}>
              {loading?'Creating…':'Create Account'}
            </button>
          </form>
        )}
      </div>
    </div>
  );
}

// ─── DASHBOARD ───────────────────────────────────────────────────────────────
function Dashboard({user}){
  const {showToast}=useApp();
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(true);

  const load=async()=>{
    setLoading(true);
    try{const {data:d}=await api.get('/dashboard/stats');setData(d);}
    catch(e){showToast('Failed to load dashboard','error');}
    finally{setLoading(false);}
  };
  useEffect(()=>{load();},[]);

  if(loading)return<div style={{padding:40,textAlign:'center',color:'var(--text3)'}}>Loading dashboard…</div>;
  if(!data)return null;

  const {stats,recentLeads,monthlyData,sourceData,statusData}=data;
  const maxMonthly=Math.max(...(monthlyData||[]).map(m=>m.total),1);
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  return(
    <div className="animate-in">
      {/* Stat Cards */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:16,marginBottom:24}}>
        {[
          {label:'Total Leads',val:stats.totalLeads,sub:`${stats.newLeads} new`,color:'blue',pct:100},
          {label:'Converted',val:stats.convertedLeads,sub:`${stats.conversionRate}% rate`,color:'green',pct:stats.conversionRate},
          {label:'Pipeline Value',val:`$${(stats.totalValue||0).toLocaleString()}`,sub:'converted deals',color:'amber',pct:70},
          ...(user?.role!=='sales'?[{label:'Team Members',val:stats.totalUsers||0,sub:'active users',color:'purple',pct:80}]:[]),
        ].map((s,i)=>(
          <div key={i} className={`stat-card ${s.color}`}>
            <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:8}}>{s.label}</div>
            <div style={{fontSize:28,fontWeight:700,color:'var(--text)',lineHeight:1}}>{s.val}</div>
            <div style={{fontSize:12,color:'var(--text3)',marginTop:4}}>{s.sub}</div>
            <div className="mini-bar" style={{marginTop:12}}>
              <div className="mini-bar-fill" style={{width:`${Math.min(100,s.pct)}%`,background:`var(--${s.color==='blue'?'accent':s.color})`}}/>
            </div>
          </div>
        ))}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:16,marginBottom:24}}>
        {/* Monthly Chart */}
        <div className="card">
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
            <div><div className="section-title" style={{fontSize:14}}>Lead Activity</div><div className="section-sub">Last 6 months</div></div>
          </div>
          <div className="chart-bar">
            {(monthlyData||[]).slice(-6).map((m,i)=>(
              <div key={i} className="chart-col">
                <div style={{fontSize:10,color:'var(--text3)',marginBottom:4}}>{m.total}</div>
                <div className="chart-col-bar" style={{height:`${(m.total/maxMonthly)*90}px`}}/>
                <div className="chart-col-label">{months[(m._id?.month||1)-1]}</div>
              </div>
            ))}
            {(!monthlyData||monthlyData.length===0)&&<div style={{color:'var(--text3)',fontSize:13,width:'100%',textAlign:'center',paddingTop:40}}>No data yet</div>}
          </div>
        </div>

        {/* Source Breakdown */}
        <div className="card">
          <div style={{marginBottom:16}}><div className="section-title" style={{fontSize:14}}>Lead Sources</div></div>
          {(sourceData||[]).slice(0,5).map((s,i)=>{
            const total=sourceData.reduce((a,b)=>a+b.count,0)||1;
            const pct=Math.round((s.count/total)*100);
            return(
              <div key={i} style={{marginBottom:12}}>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:'var(--text2)',marginBottom:4}}>
                  <span style={{textTransform:'capitalize'}}>{(s._id||'other').replace('_',' ')}</span>
                  <span style={{color:'var(--text3)'}}>{pct}%</span>
                </div>
                <div className="progress-bar"><div className="progress-fill" style={{width:`${pct}%`,background:'var(--accent)'}}/></div>
              </div>
            );
          })}
          {(!sourceData||sourceData.length===0)&&<div style={{color:'var(--text3)',fontSize:13,textAlign:'center',padding:'20px 0'}}>No data yet</div>}
        </div>
      </div>

      {/* Recent Leads */}
      <div className="card">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
          <div><div className="section-title" style={{fontSize:14}}>Recent Leads</div></div>
        </div>
        {recentLeads?.length>0?(
          <div className="table-wrapper">
            <table>
              <thead><tr><th>Name</th><th>Email</th><th>Status</th><th>Priority</th><th>Date</th></tr></thead>
              <tbody>{recentLeads.map(l=>(
                <tr key={l._id}>
                  <td style={{fontWeight:600,color:'var(--text)'}}>{l.name}</td>
                  <td style={{color:'var(--text3)'}}>{l.email}</td>
                  <td><span className={`badge badge-${l.status}`}>{l.status}</span></td>
                  <td><span className={`badge badge-${l.priority}`}>{l.priority}</span></td>
                  <td style={{color:'var(--text3)'}}>{fmt(l.createdAt)}</td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        ):(
          <div className="empty-state"><Icon n="leads" s={40}/><p style={{marginTop:8}}>No leads yet. Add your first lead!</p></div>
        )}
      </div>
    </div>
  );
}

// ─── LEAD FORM MODAL ─────────────────────────────────────────────────────────
function LeadModal({lead,onClose,onSave,users,currentUser}){
  const [form,setForm]=useState(lead||{name:'',email:'',phone:'',company:'',source:'website',status:'new',priority:'medium',value:0,assignedTo:'',tags:''});
  const [loading,setLoading]=useState(false);
  const {showToast}=useApp();

  const handleSubmit=async e=>{
    e.preventDefault();setLoading(true);
    try{
      const payload={...form,value:Number(form.value)||0,tags:typeof form.tags==='string'?form.tags.split(',').map(t=>t.trim()).filter(Boolean):form.tags};
      if(lead?._id){await api.put(`/leads/${lead._id}`,payload);}
      else{await api.post('/leads',payload);}
      showToast(lead?'Lead updated':'Lead created','success');
      onSave();onClose();
    }catch(e){showToast(e.response?.data?.error||'Failed to save','error');}
    finally{setLoading(false);}
  };

  const f=(k,v)=>setForm(p=>({...p,[k]:v}));
  return(
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal">
        <div className="modal-header">
          <div style={{fontSize:16,fontWeight:700}}>{lead?'Edit Lead':'New Lead'}</div>
          <button className="btn btn-ghost" onClick={onClose}><Icon n="close" s={16}/></button>
        </div>
        <form onSubmit={handleSubmit}>
          <div className="modal-body">
            <div className="form-row">
              <div className="form-group"><label className="form-label">Full Name *</label><input value={form.name} onChange={e=>f('name',e.target.value)} required placeholder="Jane Smith"/></div>
              <div className="form-group"><label className="form-label">Email *</label><input type="email" value={form.email} onChange={e=>f('email',e.target.value)} required placeholder="jane@example.com"/></div>
            </div>
            <div className="form-row">
              <div className="form-group"><label className="form-label">Phone</label><input value={form.phone} onChange={e=>f('phone',e.target.value)} placeholder="+1 555-000-0000"/></div>
              <div className="form-group"><label className="form-label">Company</label><input value={form.company} onChange={e=>f('company',e.target.value)} placeholder="Acme Corp"/></div>
            </div>
            <div className="form-row">
              <div className="form-group"><label className="form-label">Source</label>
                <select value={form.source} onChange={e=>f('source',e.target.value)}>
                  {['website','referral','social_media','cold_call','email_campaign','event','other'].map(s=><option key={s} value={s}>{s.replace('_',' ')}</option>)}
                </select>
              </div>
              <div className="form-group"><label className="form-label">Status</label>
                <select value={form.status} onChange={e=>f('status',e.target.value)}>
                  {['new','contacted','qualified','proposal','negotiation','converted','lost'].map(s=><option key={s} value={s}>{s}</option>)}
                </select>
              </div>
            </div>
            <div className="form-row">
              <div className="form-group"><label className="form-label">Priority</label>
                <select value={form.priority} onChange={e=>f('priority',e.target.value)}>
                  {['low','medium','high'].map(s=><option key={s} value={s}>{s}</option>)}
                </select>
              </div>
              <div className="form-group"><label className="form-label">Deal Value ($)</label><input type="number" value={form.value} onChange={e=>f('value',e.target.value)} placeholder="0" min="0"/></div>
            </div>
            {users?.length>0&&(
              <div className="form-group"><label className="form-label">Assign To</label>
                <select value={form.assignedTo||''} onChange={e=>f('assignedTo',e.target.value)}>
                  <option value="">Unassigned</option>
                  {users
                    .filter(u => u.role !== 'admin' && u._id !== currentUser?._id)
                    .map(u=><option key={u._id} value={u._id}>{u.name} ({u.role})</option>)}
                </select>
              </div>
            )}
            <div className="form-group"><label className="form-label">Tags (comma separated)</label><input value={Array.isArray(form.tags)?form.tags.join(', '):form.tags} onChange={e=>f('tags',e.target.value)} placeholder="enterprise, hot, q4"/></div>
          </div>
          <div className="modal-footer">
            <button type="button" className="btn btn-secondary" onClick={onClose}>Cancel</button>
            <button type="submit" className="btn btn-primary" disabled={loading}>{loading?'Saving…':'Save Lead'}</button>
          </div>
        </form>
      </div>
    </div>
  );
}

// ─── NOTE MODAL ───────────────────────────────────────────────────────────────
function NoteModal({lead,onClose,onSave}){
  const [text,setText]=useState('');
  const [loading,setLoading]=useState(false);
  const {showToast}=useApp();
  const handleSubmit=async e=>{
    e.preventDefault();if(!text.trim())return;setLoading(true);
    try{await api.post(`/leads/${lead._id}/notes`,{text});showToast('Note added','success');onSave();onClose();}
    catch(e){showToast('Failed to add note','error');}
    finally{setLoading(false);}
  };
  return(
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal" style={{maxWidth:440}}>
        <div className="modal-header">
          <div style={{fontSize:16,fontWeight:700}}>Add Note — {lead.name}</div>
          <button className="btn btn-ghost" onClick={onClose}><Icon n="close" s={16}/></button>
        </div>
        <form onSubmit={handleSubmit}>
          <div className="modal-body">
            <div className="form-group"><label className="form-label">Note</label><textarea rows={5} value={text} onChange={e=>setText(e.target.value)} placeholder="Add your note here…" required/></div>
          </div>
          <div className="modal-footer">
            <button type="button" className="btn btn-secondary" onClick={onClose}>Cancel</button>
            <button type="submit" className="btn btn-primary" disabled={loading}>{loading?'Adding…':'Add Note'}</button>
          </div>
        </form>
      </div>
    </div>
  );
}

// ─── LEAD DETAIL MODAL ────────────────────────────────────────────────────────
function LeadDetailModal({lead,onClose,onEdit,onAddNote}){
  const stageOrder=['new','contacted','qualified','proposal','negotiation','converted','lost'];
  const currentIdx=stageOrder.indexOf(lead.status);
  return(
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal" style={{maxWidth:640}}>
        <div className="modal-header">
          <div>
            <div style={{fontSize:16,fontWeight:700}}>{lead.name}</div>
            <div style={{fontSize:12,color:'var(--text3)',marginTop:2}}>{lead.email} {lead.phone&&`· ${lead.phone}`}</div>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-secondary btn-sm" onClick={onEdit}><Icon n="edit" s={13}/> Edit</button>
            <button className="btn btn-ghost" onClick={onClose}><Icon n="close" s={16}/></button>
          </div>
        </div>
        <div className="modal-body">
          {/* Pipeline */}
          <div style={{marginBottom:20}}>
            <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:10}}>Pipeline Stage</div>
            <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
              {stageOrder.map((s,i)=>(
                <div key={s} style={{flex:1,minWidth:60,textAlign:'center'}}>
                  <div style={{height:4,borderRadius:2,background:i<=currentIdx?'var(--accent)':'var(--border)',marginBottom:4,transition:'background .3s'}}/>
                  <div style={{fontSize:10,color:i===currentIdx?'var(--accent2)':'var(--text3)',fontWeight:i===currentIdx?700:400,textTransform:'capitalize'}}>{s}</div>
                </div>
              ))}
            </div>
          </div>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:20}}>
            {[
              {l:'Company',v:lead.company||'—'},
              {l:'Source',v:(lead.source||'—').replace('_',' ')},
              {l:'Priority',v:<span className={`badge badge-${lead.priority}`}>{lead.priority}</span>},
              {l:'Deal Value',v:`$${(lead.value||0).toLocaleString()}`},
              {l:'Score',v:<div className="score-ring" style={{borderColor:'var(--accent)',color:'var(--accent2)'}}>{lead.score||0}</div>},
              {l:'Created',v:fmt(lead.createdAt)},
            ].map(({l,v})=>(
              <div key={l} style={{background:'var(--bg3)',borderRadius:'var(--radius-sm)',padding:'10px 14px'}}>
                <div style={{fontSize:11,color:'var(--text3)',marginBottom:4,textTransform:'uppercase',letterSpacing:'.4px'}}>{l}</div>
                <div style={{fontSize:13,color:'var(--text)',fontWeight:500}}>{v}</div>
              </div>
            ))}
          </div>

          {/* Tags */}
          {lead.tags?.length>0&&(
            <div style={{marginBottom:16}}>
              <div style={{fontSize:11,color:'var(--text3)',marginBottom:6,textTransform:'uppercase',letterSpacing:'.5px'}}>Tags</div>
              <div>{lead.tags.map(t=><span key={t} className="tag">{t}</span>)}</div>
            </div>
          )}

          {/* Notes */}
          <div style={{marginBottom:16}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
              <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.5px'}}>Notes ({lead.notes?.length||0})</div>
              <button className="btn btn-secondary btn-sm" onClick={onAddNote}><Icon n="plus" s={12}/> Add Note</button>
            </div>
            {lead.notes?.length>0?[...lead.notes].reverse().map((n,i)=>(
              <div key={i} className="note-item">
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                  <div style={{fontSize:12,fontWeight:600,color:'var(--accent2)'}}>{n.authorName||'Unknown'}</div>
                  <div style={{fontSize:11,color:'var(--text3)'}}>{fmtTime(n.createdAt)}</div>
                </div>
                <div style={{fontSize:13,color:'var(--text2)',lineHeight:1.6}}>{n.text}</div>
              </div>
            )):<div style={{fontSize:13,color:'var(--text3)',textAlign:'center',padding:'20px 0'}}>No notes yet. Add the first one!</div>}
          </div>

          {/* Activity */}
          {lead.activities?.length>0&&(
            <div>
              <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:10}}>Activity ({lead.activities.length})</div>
              <div>{[...lead.activities].reverse().slice(0,8).map((a,i)=>(
                <div key={i} className="activity-item">
                  <div className="activity-dot" style={{background:a.type==='created'?'var(--green)':a.type==='status_change'?'var(--amber)':'var(--accent)'}}/>
                  <div>
                    <div style={{fontSize:12,color:'var(--text2)'}}>{a.description}</div>
                    <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{fmtTime(a.createdAt)}</div>
                  </div>
                </div>
              ))}</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── LEADS PAGE ───────────────────────────────────────────────────────────────
function LeadsPage({user}){
  const {showToast}=useApp();
  const [leads,setLeads]=useState([]);
  const [pagination,setPagination]=useState({total:0,page:1,pages:1});
  const [loading,setLoading]=useState(true);
  const [search,setSearch]=useState('');
  const [statusFilter,setStatusFilter]=useState('');
  const [priorityFilter,setPriorityFilter]=useState('');
  const [showModal,setShowModal]=useState(false);
  const [editLead,setEditLead]=useState(null);
  const [detailLead,setDetailLead]=useState(null);
  const [noteTarget,setNoteTarget]=useState(null);
  const [users,setUsers]=useState([]);
  const [page,setPage]=useState(1);
  const searchRef=useRef();

  const loadLeads=useCallback(async()=>{
    setLoading(true);
    try{
      const params={page,limit:10,...(search&&{search}),...(statusFilter&&{status:statusFilter}),...(priorityFilter&&{priority:priorityFilter})};
      const {data}=await api.get('/leads',{params});
      setLeads(data.leads);setPagination(data.pagination);
    }catch(e){showToast('Failed to load leads','error');}
    finally{setLoading(false);}
  },[page,search,statusFilter,priorityFilter]);

  useEffect(()=>{loadLeads();},[loadLeads]);
  useEffect(()=>{
    if(user?.role!=='sales') api.get('/users').then(r=>setUsers(r.data.users)).catch(()=>{});
  },[user]);

  const handleDelete=async id=>{
    if(!confirm('Delete this lead? This cannot be undone.'))return;
    try{await api.delete(`/leads/${id}`);showToast('Lead deleted','success');loadLeads();}
    catch(e){showToast(e.response?.data?.error||'Failed to delete','error');}
  };

  const handleExport=async()=>{
    try{
      const res=await api.get('/leads/export/csv',{responseType:'blob'});
      const url=URL.createObjectURL(res.data);
      const a=document.createElement('a');a.href=url;a.download='leads.csv';a.click();
      showToast('Leads exported','success');
    }catch(e){showToast('Export failed','error');}
  };

  const handleStatusChange=async(id,status)=>{
    try{await api.put(`/leads/${id}`,{status});showToast('Status updated','success');loadLeads();}
    catch(e){showToast('Failed to update','error');}
  };

  const openDetail=async id=>{
    try{const {data}=await api.get(`/leads/${id}`);setDetailLead(data.lead);}
    catch(e){showToast('Failed to load lead','error');}
  };

  return(
    <div className="animate-in">
      {/* Controls */}
      <div style={{display:'flex',gap:10,marginBottom:20,flexWrap:'wrap',alignItems:'center'}}>
        <div className="search-bar" style={{flex:1,minWidth:200}}>
          <Icon n="search" s={14} c="var(--text3)"/>
          <span className="search-icon"/>
          <input ref={searchRef} placeholder="Search by name, email, company…" value={search}
            onChange={e=>{setSearch(e.target.value);setPage(1);}}/>
        </div>
        <select style={{width:140}} value={statusFilter} onChange={e=>{setStatusFilter(e.target.value);setPage(1);}}>
          <option value="">All Statuses</option>
          {['new','contacted','qualified','proposal','negotiation','converted','lost'].map(s=><option key={s} value={s}>{s}</option>)}
        </select>
        <select style={{width:130}} value={priorityFilter} onChange={e=>{setPriorityFilter(e.target.value);setPage(1);}}>
          <option value="">All Priorities</option>
          {['low','medium','high'].map(p=><option key={p} value={p}>{p}</option>)}
        </select>
        {(user?.role==='admin'||user?.role==='manager')&&(
          <button className="btn btn-secondary" onClick={handleExport}><Icon n="export" s={14}/> Export CSV</button>
        )}
        <button className="btn btn-primary" onClick={()=>{setEditLead(null);setShowModal(true);}}>
          <Icon n="plus" s={14}/> Add Lead
        </button>
      </div>

      {/* Table */}
      <div className="card" style={{padding:0}}>
        <div style={{padding:'16px 20px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{fontSize:13,color:'var(--text3)'}}>{pagination.total} total lead{pagination.total!==1?'s':''}</div>
          <button className="btn btn-ghost btn-sm" onClick={loadLeads}><Icon n="refresh" s={13}/></button>
        </div>
        {loading?(
          <div style={{padding:60,textAlign:'center',color:'var(--text3)'}}>Loading leads…</div>
        ):leads.length===0?(
          <div className="empty-state"><Icon n="leads" s={48}/><p style={{marginTop:12,fontSize:14}}>No leads found</p><p style={{marginTop:6,fontSize:13}}>Try adjusting your search or filters</p></div>
        ):(
          <div className="table-wrapper">
            <table>
              <thead><tr><th>Name</th><th>Contact</th><th>Source</th><th>Status</th><th>Priority</th><th>Score</th><th>Value</th><th>Date</th><th>Actions</th></tr></thead>
              <tbody>{leads.map(l=>(
                <tr key={l._id}>
                  <td>
                    <div style={{display:'flex',alignItems:'center',gap:10}}>
                      <div className="avatar" style={{width:28,height:28,fontSize:10}}>{initials(l.name)}</div>
                      <div>
                        <div style={{fontWeight:600,color:'var(--text)',cursor:'pointer'}} onClick={()=>openDetail(l._id)}>{l.name}</div>
                        {l.company&&<div style={{fontSize:11,color:'var(--text3)'}}>{l.company}</div>}
                      </div>
                    </div>
                  </td>
                  <td style={{color:'var(--text3)'}}>
                    <div style={{fontSize:12}}>{l.email}</div>
                    {l.phone&&<div style={{fontSize:11,marginTop:1}}>{l.phone}</div>}
                  </td>
                  <td><span style={{textTransform:'capitalize',fontSize:12,color:'var(--text3)'}}>{(l.source||'').replace('_',' ')}</span></td>
                  <td>
                    <select value={l.status} onChange={e=>handleStatusChange(l._id,e.target.value)}
                      style={{background:'transparent',border:'none',padding:'3px 0',fontSize:12,cursor:'pointer',color:'inherit',width:'auto'}}>
                      {['new','contacted','qualified','proposal','negotiation','converted','lost'].map(s=>(
                        <option key={s} value={s}>{s}</option>
                      ))}
                    </select>
                    <span className={`badge badge-${l.status}`} style={{pointerEvents:'none',position:'absolute',opacity:0}}/>
                    <span className={`badge badge-${l.status}`}>{l.status}</span>
                  </td>
                  <td><span className={`badge badge-${l.priority}`}>{l.priority}</span></td>
                  <td>
                    <div className="score-ring" style={{borderColor:l.score>=70?'var(--green)':l.score>=40?'var(--amber)':'var(--text3)',color:l.score>=70?'var(--green)':l.score>=40?'var(--amber)':'var(--text3)',fontSize:11}}>
                      {l.score||0}
                    </div>
                  </td>
                  <td style={{fontWeight:600,color:'var(--text)'}}>{l.value>0?`$${l.value.toLocaleString()}`:'-'}</td>
                  <td style={{color:'var(--text3)',fontSize:12}}>{fmt(l.createdAt)}</td>
                  <td>
                    <div style={{display:'flex',gap:4}}>
                      <button className="btn btn-ghost btn-sm" title="View" onClick={()=>openDetail(l._id)}><Icon n="eye" s={13}/></button>
                      <button className="btn btn-ghost btn-sm" title="Add Note" onClick={()=>setNoteTarget(l)}><Icon n="note" s={13}/></button>
                      <button className="btn btn-ghost btn-sm" title="Edit" onClick={()=>{setEditLead(l);setShowModal(true);}}><Icon n="edit" s={13}/></button>
                      {(user?.role==='admin'||user?.role==='manager')&&(
                        <button className="btn btn-ghost btn-sm" title="Delete" onClick={()=>handleDelete(l._id)} style={{color:'var(--red)'}}><Icon n="trash" s={13}/></button>
                      )}
                    </div>
                  </td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        )}
        {/* Pagination */}
        {pagination.pages>1&&(
          <div style={{padding:'14px 20px',borderTop:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{fontSize:12,color:'var(--text3)'}}>Page {pagination.page} of {pagination.pages}</div>
            <div style={{display:'flex',gap:6}}>
              <button className="btn btn-secondary btn-sm" disabled={page<=1} onClick={()=>setPage(p=>p-1)}>Prev</button>
              {Array.from({length:Math.min(5,pagination.pages)},(_,i)=>{
                const p=Math.max(1,Math.min(pagination.pages-4,page-2))+i;
                return p<=pagination.pages&&(
                  <button key={p} className={`btn btn-sm ${p===page?'btn-primary':'btn-secondary'}`} onClick={()=>setPage(p)}>{p}</button>
                );
              })}
              <button className="btn btn-secondary btn-sm" disabled={page>=pagination.pages} onClick={()=>setPage(p=>p+1)}>Next</button>
            </div>
          </div>
        )}
      </div>

      {showModal&&<LeadModal lead={editLead} onClose={()=>{setShowModal(false);setEditLead(null);}} onSave={loadLeads} users={users} currentUser={user}/>}
      {noteTarget&&<NoteModal lead={noteTarget} onClose={()=>setNoteTarget(null)} onSave={loadLeads}/>}
      {detailLead&&(
        <LeadDetailModal
          lead={detailLead}
          onClose={()=>setDetailLead(null)}
          onEdit={()=>{setEditLead(detailLead);setDetailLead(null);setShowModal(true);}}
          onAddNote={()=>{setNoteTarget(detailLead);setDetailLead(null);}}
        />
      )}
    </div>
  );
}

// ─── USERS PAGE ───────────────────────────────────────────────────────────────
function UsersPage({user}){
  const {showToast}=useApp();
  const [users,setUsers]=useState([]);
  const [loading,setLoading]=useState(true);
  const [showModal,setShowModal]=useState(false);
  const [editUser,setEditUser]=useState(null);
  const [form,setForm]=useState({name:'',email:'',password:'',role:'sales'});
  const [saving,setSaving]=useState(false);

  const load=async()=>{
    setLoading(true);
    try{const {data}=await api.get('/users');setUsers(data.users);}
    catch(e){showToast('Failed to load users','error');}
    finally{setLoading(false);}
  };
  useEffect(()=>{load();},[]);

  const handleSave=async e=>{
    e.preventDefault();setSaving(true);
    try{
      if(editUser){await api.put(`/users/${editUser._id}`,{name:form.name,email:form.email,role:form.role});}
      else{await api.post('/users',form);}
      showToast(editUser?'User updated':'User created','success');
      setShowModal(false);setEditUser(null);setForm({name:'',email:'',password:'',role:'sales'});
      load();
    }catch(e){showToast(e.response?.data?.error||'Failed to save','error');}
    finally{setSaving(false);}
  };

  const handleDelete=async id=>{
    if(!confirm('Delete this user?'))return;
    try{await api.delete(`/users/${id}`);showToast('User deleted','success');load();}
    catch(e){showToast(e.response?.data?.error||'Failed to delete','error');}
  };

  const handleToggle=async(u)=>{
    try{await api.put(`/users/${u._id}`,{isActive:!u.isActive});showToast('User updated','success');load();}
    catch(e){showToast('Failed to update','error');}
  };

  return(
    <div className="animate-in">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div style={{fontSize:13,color:'var(--text3)'}}>{users.length} team member{users.length!==1?'s':''}</div>
        {user?.role==='admin'&&<button className="btn btn-primary" onClick={()=>{setEditUser(null);setForm({name:'',email:'',password:'',role:'sales'});setShowModal(true);}}><Icon n="plus" s={14}/> Add User</button>}
      </div>
      <div className="card" style={{padding:0}}>
        {loading?<div style={{padding:60,textAlign:'center',color:'var(--text3)'}}>Loading…</div>:(
          <div className="table-wrapper">
            <table>
              <thead><tr><th>User</th><th>Email</th><th>Role</th><th>Status</th><th>Last Login</th><th>Joined</th>{user?.role==='admin'&&<th>Actions</th>}</tr></thead>
              <tbody>{users.map(u=>(
                <tr key={u._id}>
                  <td><div style={{display:'flex',alignItems:'center',gap:10}}>
                    <div className="avatar">{initials(u.name)}</div>
                    <div style={{fontWeight:600,color:'var(--text)'}}>{u.name}{u._id===user?._id&&<span style={{fontSize:11,color:'var(--text3)',marginLeft:6}}>(you)</span>}</div>
                  </div></td>
                  <td style={{color:'var(--text3)'}}>{u.email}</td>
                  <td><span className={`badge badge-${u.role}`}>{u.role}</span></td>
                  <td><span className={`badge ${u.isActive?'badge-converted':'badge-lost'}`}>{u.isActive?'Active':'Inactive'}</span></td>
                  <td style={{color:'var(--text3)',fontSize:12}}>{u.lastLogin?fmtTime(u.lastLogin):'Never'}</td>
                  <td style={{color:'var(--text3)',fontSize:12}}>{fmt(u.createdAt)}</td>
                  {user?.role==='admin'&&<td><div style={{display:'flex',gap:4}}>
                    <button className="btn btn-ghost btn-sm" onClick={()=>{setEditUser(u);setForm({name:u.name,email:u.email,password:'',role:u.role});setShowModal(true);}}><Icon n="edit" s={13}/></button>
                    <button className="btn btn-ghost btn-sm" onClick={()=>handleToggle(u)} style={{color:u.isActive?'var(--amber)':'var(--green)'}}>{u.isActive?'Deactivate':'Activate'}</button>
                    {u._id!==user?._id&&<button className="btn btn-ghost btn-sm" onClick={()=>handleDelete(u._id)} style={{color:'var(--red)'}}><Icon n="trash" s={13}/></button>}
                  </div></td>}
                </tr>
              ))}</tbody>
            </table>
          </div>
        )}
      </div>

      {showModal&&(
        <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget){setShowModal(false);setEditUser(null);}}}>
          <div className="modal" style={{maxWidth:440}}>
            <div className="modal-header">
              <div style={{fontSize:16,fontWeight:700}}>{editUser?'Edit User':'New User'}</div>
              <button className="btn btn-ghost" onClick={()=>{setShowModal(false);setEditUser(null);}}><Icon n="close" s={16}/></button>
            </div>
            <form onSubmit={handleSave}>
              <div className="modal-body">
                <div className="form-group"><label className="form-label">Full Name</label><input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} required/></div>
                <div className="form-group"><label className="form-label">Email</label><input type="email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} required/></div>
                {!editUser&&<div className="form-group"><label className="form-label">Password</label><input type="password" value={form.password} onChange={e=>setForm({...form,password:e.target.value})} required minLength={6}/></div>}
                <div className="form-group"><label className="form-label">Role</label>
                  <select value={form.role} onChange={e=>setForm({...form,role:e.target.value})}>
                    <option value="sales">Sales Rep</option>
                    <option value="manager">Manager</option>
                  </select>
                </div>
              </div>
              <div className="modal-footer">
                <button type="button" className="btn btn-secondary" onClick={()=>{setShowModal(false);setEditUser(null);}}>Cancel</button>
                <button type="submit" className="btn btn-primary" disabled={saving}>{saving?'Saving…':'Save'}</button>
              </div>
            </form>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── ANALYTICS PAGE ───────────────────────────────────────────────────────────
function AnalyticsPage(){
  const {showToast}=useApp();
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{
    api.get('/dashboard/stats').then(r=>setData(r.data)).catch(()=>showToast('Failed to load analytics','error')).finally(()=>setLoading(false));
  },[]);

  if(loading)return<div style={{padding:60,textAlign:'center',color:'var(--text3)'}}>Loading analytics…</div>;
  if(!data)return null;

  const {stats,statusData,sourceData,monthlyData}=data;
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const maxM=Math.max(...(monthlyData||[]).map(m=>m.total),1);

  return(
    <div className="animate-in">
      {/* KPI Row */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:24}}>
        {[
          {l:'Total Leads',v:stats.totalLeads,c:'var(--accent)'},
          {l:'Conversion Rate',v:`${stats.conversionRate}%`,c:'var(--green)'},
          {l:'Converted',v:stats.convertedLeads,c:'var(--green)'},
          {l:'Lost',v:stats.lostLeads,c:'var(--red)'},
        ].map((k,i)=>(
          <div key={i} className="card" style={{textAlign:'center'}}>
            <div style={{fontSize:11,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:8}}>{k.l}</div>
            <div style={{fontSize:32,fontWeight:700,color:k.c}}>{k.v}</div>
          </div>
        ))}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
        {/* Status Breakdown */}
        <div className="card">
          <div style={{fontSize:14,fontWeight:700,marginBottom:16}}>Status Breakdown</div>
          {(statusData||[]).map((s,i)=>{
            const total=statusData.reduce((a,b)=>a+b.count,0)||1;
            const pct=Math.round((s.count/total)*100);
            const colors={new:'var(--accent)',contacted:'var(--amber)',qualified:'var(--cyan)',proposal:'var(--purple)',negotiation:'#fb7185',converted:'var(--green)',lost:'var(--red)'};
            return(
              <div key={i} style={{marginBottom:14}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
                  <span style={{textTransform:'capitalize',fontSize:13,color:'var(--text2)'}}>{s._id}</span>
                  <span style={{fontSize:12,color:'var(--text3)'}}>{s.count} ({pct}%)</span>
                </div>
                <div className="progress-bar"><div className="progress-fill" style={{width:`${pct}%`,background:colors[s._id]||'var(--accent)'}}/></div>
              </div>
            );
          })}
          {(!statusData||statusData.length===0)&&<div style={{color:'var(--text3)',fontSize:13,textAlign:'center',padding:'20px 0'}}>No data yet</div>}
        </div>

        {/* Source Breakdown */}
        <div className="card">
          <div style={{fontSize:14,fontWeight:700,marginBottom:16}}>Source Performance</div>
          {(sourceData||[]).map((s,i)=>{
            const total=sourceData.reduce((a,b)=>a+b.count,0)||1;
            const pct=Math.round((s.count/total)*100);
            return(
              <div key={i} style={{marginBottom:14}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                  <span style={{textTransform:'capitalize',fontSize:13,color:'var(--text2)'}}>{(s._id||'other').replace(/_/g,' ')}</span>
                  <span style={{fontSize:12,color:'var(--text3)'}}>{s.count} ({pct}%)</span>
                </div>
                <div className="progress-bar"><div className="progress-fill" style={{width:`${pct}%`,background:'var(--purple)'}}/></div>
              </div>
            );
          })}
          {(!sourceData||sourceData.length===0)&&<div style={{color:'var(--text3)',fontSize:13,textAlign:'center',padding:'20px 0'}}>No data yet</div>}
        </div>
      </div>

      {/* Monthly Trend */}
      <div className="card">
        <div style={{fontSize:14,fontWeight:700,marginBottom:20}}>Monthly Trends (Last 6 months)</div>
        {monthlyData?.length>0?(
          <div style={{display:'flex',gap:16}}>
            {monthlyData.slice(-6).map((m,i)=>(
              <div key={i} style={{flex:1,textAlign:'center'}}>
                <div style={{fontSize:12,color:'var(--text3)',marginBottom:8}}>{m.total} total</div>
                <div style={{height:100,display:'flex',alignItems:'flex-end',justifyContent:'center',gap:4}}>
                  <div style={{width:20,borderRadius:'4px 4px 0 0',height:`${(m.total/maxM)*90}px`,background:'linear-gradient(180deg,var(--accent),rgba(59,130,246,.3))',minHeight:4}}/>
                  <div style={{width:20,borderRadius:'4px 4px 0 0',height:`${(m.converted/Math.max(m.total,1))*90*(m.total/maxM)}px`,background:'linear-gradient(180deg,var(--green),rgba(16,185,129,.3))',minHeight:m.converted>0?4:0}}/>
                </div>
                <div style={{fontSize:11,color:'var(--text3)',marginTop:6}}>{months[(m._id?.month||1)-1]}</div>
              </div>
            ))}
          </div>
        ):<div style={{textAlign:'center',color:'var(--text3)',padding:'40px 0'}}>No monthly data yet</div>}
        <div style={{display:'flex',gap:16,marginTop:12,justifyContent:'center'}}>
          <div style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:'var(--text3)'}}><div style={{width:10,height:10,borderRadius:2,background:'var(--accent)'}}/> Total Leads</div>
          <div style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:'var(--text3)'}}><div style={{width:10,height:10,borderRadius:2,background:'var(--green)'}}/> Converted</div>
        </div>
      </div>
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(()=>{
    try{return JSON.parse(localStorage.getItem('user'));}catch{return null;}
  });
  const [showLogin,setShowLogin]=useState(false);
  const [page,setPage]=useState('dashboard');
  const [toasts,setToasts]=useState([]);
  const showToast=(message,type='info')=>{
    setToasts(p=>[...p,{id:Date.now(),message,type}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==Date.now())),3000);
  };

  const handleLogin=(userData)=>{
    setUser(userData);
    setShowLogin(false);
  };

  const handleLogout=()=>{
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    setUser(null);
    setShowLogin(false);
  };

  if(!user){
    if(showLogin){
      return(
        <AppContext.Provider value={{showToast}}>
          <LoginPage onLogin={handleLogin} onBackToIntro={()=>setShowLogin(false)}/>
          <ToastContainer toasts={toasts}/>
        </AppContext.Provider>
      );
    }
    
    return(
      <AppContext.Provider value={{showToast}}>
        <LandingPage onLogin={()=>setShowLogin(true)}/>
        <ToastContainer toasts={toasts}/>
      </AppContext.Provider>
    );
  }

  return(
    <AppContext.Provider value={{showToast,user}}>
      <Sidebar page={page} setPage={setPage} user={user} onLogout={handleLogout}/>
      <div className="main-content">
        <Topbar page={page} user={user}/>
        <div className="page-content">
          {page==='dashboard'&&<Dashboard user={user}/>}
          {page==='leads'&&<LeadsPage user={user}/>}
          {page==='users'&&(user?.role==='admin'||user?.role==='manager')&&<UsersPage user={user}/>}
          {page==='analytics'&&<AnalyticsPage/>}
        </div>
      </div>
      <ToastContainer toasts={toasts}/>
    </AppContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
